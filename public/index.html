<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>18+ Streaming Only</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="ageGate" class="age-gate active">
      <div class="gate-card">
        <h1>Adults Only (18+)</h1>
        <p>This streaming platform is for viewers 18+ only.</p>
        <div class="gate-actions">
          <button id="enterBtn" class="btn primary">I am 18+</button>
          <button id="exitBtn" class="btn">Exit</button>
        </div>
        <p id="gateError" class="error"></p>
      </div>
    </div>

    <header>
      <h1>StreamVault</h1>
      <p>18+ streaming-only platform MVP</p>
      <div id="assumptions" class="assumptions"></div>
    </header>

    <main class="layout">
      <section>
        <div class="account card">
          <h2>Account</h2>
          <div id="accountPanel"></div>
        </div>

        <h2>Live & Featured Streams</h2>
        <div id="streamList" class="stream-grid"></div>
      </section>

      <aside>
        <h2>Now Playing</h2>
        <div id="playerCard" class="player-card">
          <h3 id="playerTitle">Select a stream</h3>
          <video id="videoPlayer" controls playsinline></video>
        </div>

        <h2>Subscription Plans</h2>
        <div id="plans" class="plans"></div>

        <div class="notice"><strong>Notice:</strong> Demo only. Real KYC/payment integration required before production.</div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
